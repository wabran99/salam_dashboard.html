<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salam — Sales Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --g1:#061A10;--g2:#0A2E1C;--g3:#0D3D26;--g4:#1A5C35;
  --g5:#1A9E52;--g6:#3DD68C;--g7:#6FD49A;--g8:#C6F0D8;
  --gold:#D4A017;--silver:#8FA0AE;--bronze:#B07030;
  --red:#E24B4A;--amber:#EF9F27;--blue:#378ADD;
  --t1:#FFFFFF;--t2:#9ACDB0;--t3:#4A8A62;--t4:#2A5A3A;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.08);
  --border:rgba(61,214,140,0.12);--border2:rgba(61,214,140,0.28);
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--g1);font-family:'Segoe UI',system-ui,sans-serif;color:var(--t1);min-height:100vh}

/* HEADER */
.hdr{background:var(--g3);border-bottom:1px solid var(--border2);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px}
.hdr-mid h1{font-size:14px;font-weight:600;color:#fff;text-align:center}
.hdr-mid p{font-size:11px;color:var(--g7);text-align:center;margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g7)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g6);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--g7)}
.btn-o:hover{background:var(--card2)}
.btn-g{background:var(--g5);color:#fff}
.btn-g:hover{background:var(--g6);color:var(--g1)}
.btn-gold{background:linear-gradient(135deg,#B8860B,#D4A017);color:#fff}
.btn-gold:hover{background:linear-gradient(135deg,#D4A017,#F6C94E);color:#1a1a00}

/* LAYOUT */
.wrap{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:215px;flex-shrink:0;background:var(--g2);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.content{flex:1;padding:18px 22px;overflow:hidden}

/* SIDEBAR */
.sb-section{padding:0 10px;margin-bottom:18px}
.sb-label{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;transition:all .15s;font-size:12px;color:var(--t2);border:none;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:var(--card);color:var(--t1)}
.sb-item.active{background:var(--card2);color:#fff;font-weight:600}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--g5);flex-shrink:0}
.sb-count{margin-left:auto;font-size:10px;background:var(--card2);padding:2px 6px;border-radius:8px;color:var(--g7)}
.sb-div{height:1px;background:var(--border);margin:8px 10px}
.qs-val{font-size:20px;font-weight:700;color:#fff}
.qs-lbl{font-size:10px;color:var(--t3);margin-bottom:8px}

/* ── PREMIUM KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}

.kpi-card{border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;border:1px solid transparent}

.kpi-card.kpi-sales{
  background:linear-gradient(135deg,#0D3D26 0%,#1A5C35 100%);
  border-color:rgba(61,214,140,0.3);
}
.kpi-card.kpi-ach{
  background:linear-gradient(135deg,#0A2415 0%,#1A4A25 100%);
  border-color:rgba(61,214,140,0.2);
}
.kpi-card.kpi-top{
  background:linear-gradient(135deg,#2A1E00 0%,#3D2E00 100%);
  border-color:rgba(212,160,23,0.35);
}
.kpi-card.kpi-agents{
  background:linear-gradient(135deg,#0A1E2E 0%,#122E45 100%);
  border-color:rgba(55,138,221,0.3);
}

.kpi-icon{font-size:22px;margin-bottom:10px;display:block;line-height:1}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.kpi-card.kpi-sales .kpi-label{color:#5DC48A}
.kpi-card.kpi-ach   .kpi-label{color:#4AB870}
.kpi-card.kpi-top   .kpi-label{color:#B89020}
.kpi-card.kpi-agents .kpi-label{color:#4A88BB}

.kpi-value{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-card.kpi-sales  .kpi-value{color:#fff}
.kpi-card.kpi-ach    .kpi-value{color:#3DD68C}
.kpi-card.kpi-top    .kpi-value{color:#F6C94E;font-size:17px;padding-top:5px;line-height:1.3}
.kpi-card.kpi-agents .kpi-value{color:#85B7EB}

.kpi-sub{font-size:11px}
.kpi-card.kpi-sales  .kpi-sub{color:#4A8A62}
.kpi-card.kpi-ach    .kpi-sub{color:#3A7A56}
.kpi-card.kpi-top    .kpi-sub{color:#8A7020}
.kpi-card.kpi-agents .kpi-sub{color:#3A6080}

.kpi-bar{height:3px;border-radius:2px;margin-top:12px;overflow:hidden;background:rgba(255,255,255,0.08)}
.kpi-bar-fill{height:100%;border-radius:2px}
.kpi-card.kpi-sales  .kpi-bar-fill{background:linear-gradient(90deg,#1A9E52,#3DD68C)}
.kpi-card.kpi-ach    .kpi-bar-fill{background:linear-gradient(90deg,#1A9E52,#3DD68C)}
.kpi-card.kpi-top    .kpi-bar-fill{background:linear-gradient(90deg,#D4A017,#F6C94E)}
.kpi-card.kpi-agents .kpi-bar-fill{background:linear-gradient(90deg,#185FA5,#378ADD)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:18px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.chart-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}

/* SUPERVISOR CARDS */
.sup-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
.sup-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;cursor:pointer;transition:all .2s}
.sup-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px)}
.sup-card.active-sup{border-color:var(--g5);background:rgba(26,158,82,.08)}
.sup-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.sup-meta{font-size:11px;color:var(--t3);margin-bottom:10px}
.sup-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sup-nv{font-size:18px;font-weight:700;color:#fff;text-align:center}
.sup-nl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-top:2px}
.sup-pbar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:10px;overflow:hidden}
.sup-pbar-fill{height:100%;border-radius:2px}

/* FILTER + TABLE */
.sec-t{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--border2);color:var(--t1)}
.pill.on{background:var(--g5);color:#fff;border-color:var(--g5);font-weight:600}

.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tbl-hdr{padding:11px 18px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.tbl-cnt{font-size:11px;color:var(--t3)}

.tbl-head{display:grid;grid-template-columns:28px 2fr 1fr 70px 70px 70px 120px;gap:8px;padding:8px 18px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border)}
.th{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.06em}
.thc{text-align:center}.thr{text-align:right}

.tbl-row{display:grid;grid-template-columns:28px 2fr 1fr 70px 70px 70px 120px;gap:8px;padding:11px 18px;border-bottom:1px solid rgba(61,214,140,0.05);align-items:center;transition:background .12s;cursor:pointer}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--card2)}
.tbl-row.r1{background:rgba(212,160,23,.05)}
.tbl-row.r2{background:rgba(143,160,174,.04)}
.tbl-row.r3{background:rgba(176,112,48,.04)}

.rk{font-size:11px;font-weight:700;color:var(--t3);text-align:center}
.rk.g{color:var(--gold)}.rk.s{color:var(--silver)}.rk.b{color:var(--bronze)}
.en{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eb{font-size:10px;color:var(--t3);margin-top:1px}
.esup{font-size:11px;color:#7DD99A;font-weight:500}
.nw{font-size:14px;font-weight:700;color:#fff;text-align:center}
.nt{font-size:12px;color:#aaa;text-align:center}
.pv{font-size:12px;font-weight:600;text-align:center}
.prog{display:flex;flex-direction:column;gap:3px}
.prog-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s}
.prog-t{font-size:10px;color:var(--t2);text-align:right}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.search-inp{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(61,214,140,0.35);border-radius:var(--r2);padding:10px 14px 10px 36px;font-size:13px;color:#fff;outline:none;transition:all .2s}
.search-inp:focus{border-color:var(--g6);background:rgba(255,255,255,0.11)}
.search-inp::placeholder{color:#5A9A72}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
.s-res{background:var(--g3);border:1px solid var(--border2);border-radius:var(--r2);margin-top:6px;overflow:hidden;display:none;position:absolute;width:100%;z-index:100}
.s-item{padding:10px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.s-item:hover{background:var(--card2)}
.s-item:last-child{border-bottom:none}
.si-n{font-weight:600;color:#fff}
.si-m{font-size:10px;color:var(--t3);margin-top:2px}

/* EXPORT PANEL */
.export-panel{background:linear-gradient(135deg,#1A3D10 0%,#0D2E1C 100%);border:1px solid rgba(212,160,23,0.3);border-radius:var(--r);padding:18px 20px;margin-bottom:18px}
.ep-title{font-size:11px;font-weight:700;color:#B89020;text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ep-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.ep-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.ep-label{font-size:10px;color:#8A7030;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.ep-select{background:rgba(255,255,255,0.07);border:1px solid rgba(212,160,23,0.25);border-radius:var(--r2);padding:8px 12px;font-size:12px;color:#fff;outline:none;cursor:pointer;transition:border .2s}
.ep-select:focus{border-color:rgba(212,160,23,0.6)}
.ep-select option{background:#0D3D26;color:#fff}

/* LOADING/EMPTY */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--g6);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:var(--t2)}
.empty{text-align:center;padding:36px;color:var(--t3);font-size:13px}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#0D3D26;border:1px solid rgba(61,214,140,0.3);border-radius:16px;padding:26px;width:100%;max-width:480px;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.08);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,0.15)}

/* BRANCH REPORT (hidden, for export) */
#branch-report{position:fixed;top:-9999px;left:-9999px;width:800px;background:#0A2E1C;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;padding:0}

@media(max-width:1100px){
  .sidebar{display:none}.kpi-grid{grid-template-columns:repeat(2,1fr)}
  .charts-row{grid-template-columns:1fr}
  .tbl-head,.tbl-row{grid-template-columns:28px 1fr 70px 100px}
  .tbl-head>:nth-child(3),.tbl-head>:nth-child(5),.tbl-head>:nth-child(6),
  .tbl-row>:nth-child(3),.tbl-row>:nth-child(5),.tbl-row>:nth-child(6){display:none}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">salam</div>
  <div class="hdr-mid">
    <h1>Sales Performance Dashboard</h1>
    <p id="hdr-sub">Loading...</p>
  </div>
  <div class="hdr-right">
    <div class="live"><span class="dot"></span><span id="live-lbl">Live</span></div>
    <button class="btn btn-o" onclick="loadData()">↻ Refresh</button>
    <button class="btn btn-g" onclick="exportPNG()">↓ PNG</button>
  </div>
</div>

<div class="wrap">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Views</div>
      <button class="sb-item active" onclick="setView('all',this)">
        <span class="sb-dot"></span>All Supervisors<span class="sb-count" id="cnt-all">—</span>
      </button>
      <button class="sb-item" onclick="setView('Abdulwahab',this)">
        <span class="sb-dot" style="background:#F6C94E"></span>Abdulwahab<span class="sb-count" id="cnt-aw">—</span>
      </button>
      <button class="sb-item" onclick="setView('Ahmed',this)">
        <span class="sb-dot" style="background:#85B7EB"></span>Ahmed<span class="sb-count" id="cnt-am">—</span>
      </button>
      <button class="sb-item" onclick="setView('Mohammed',this)">
        <span class="sb-dot" style="background:#5DCAA5"></span>Mohammed<span class="sb-count" id="cnt-ms">—</span>
      </button>
      <button class="sb-item" onclick="setView('Najwah',this)">
        <span class="sb-dot" style="background:#ED93B1"></span>Najwah<span class="sb-count" id="cnt-na">—</span>
      </button>
    </div>
    <div class="sb-div"></div>
    <div class="sb-section">
      <div class="sb-label">Team Stats</div>
      <div style="padding:6px 8px">
        <div class="qs-lbl">Total agents</div>
        <div class="qs-val" id="sb-agents">—</div>
        <div class="qs-lbl" style="margin-top:10px">Team sales</div>
        <div class="qs-val" style="color:var(--g6)" id="sb-sales">—</div>
        <div class="qs-lbl" style="margin-top:10px">Achievement</div>
        <div class="qs-val" id="sb-pct">—</div>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spin"></div><p>Connecting to Google Sheets...</p></div>
  </div>
</div>

<!-- Hidden branch report template -->
<div id="branch-report"></div>

<script>
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQzH2quWsRx-NsAhxFeqOsz9n_KElh80hZq64gnjviHC0OGVSXTGgQIC7HbhazVChH7Cde__gKhnQut/pub?gid=59746245&single=true&output=csv';
let DATA=[],CURRENT_VIEW='all',SEARCH='',FILTER='all';
let barChart=null,donutChart=null;

// ── Parse ────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('live-lbl').textContent='Updating...';
  try{
    const r=await fetch(CSV+'&t='+Date.now());
    const txt=await r.text();
    DATA=parseCSV(txt);
    if(!DATA.length) throw new Error('empty');
    updateSidebar();
    renderView(CURRENT_VIEW);
    document.getElementById('live-lbl').textContent='Live';
    document.getElementById('hdr-sub').textContent=
      'April 2026 · '+DATA.length+' agents · Updated '+
      new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('live-lbl').textContent='Error';
    document.getElementById('content').innerHTML=
      '<div class="empty">⚠️ Could not load data.<button class="btn btn-o" style="margin-left:10px" onclick="loadData()">Retry</button></div>';
  }
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');
  if(lines.length<2) return [];
  const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);
    const o={};
    hdrs.forEach((h,j)=>o[h]=(c[j]||'').replace(/"/g,'').trim());
    const name=o['employee name']||o['name']||'';
    const mgr=o['manager']||'';
    if(!name||!mgr||name.toLowerCase().includes('auto')||name.length<2) continue;
    const target=parseFloat(o['target']||0)||0;
    const sales=parseFloat(o['user sales']||o['achieved']||0)||0;
    rows.push({
      name,user:o['user']||'',mgr,
      branch:o['branch name']||o['branch']||'',
      opco:o['operating company']||'',
      target,sales,pct:target>0?Math.round(sales/target*100):0
    });
  }
  return rows;
}

function splitLine(l){
  const r=[];let c='';let q=false;
  for(let i=0;i<l.length;i++){
    if(l[i]==='"'){q=!q;}
    else if(l[i]===','&&!q){r.push(c);c='';}
    else c+=l[i];
  }
  r.push(c);return r;
}

// ── Sidebar ──────────────────────────────────────────────────
function updateSidebar(){
  const ks={aw:0,am:0,ms:0,na:0};
  DATA.forEach(e=>{const k=mk(e.mgr);if(ks[k]!==undefined)ks[k]++;});
  document.getElementById('cnt-all').textContent=DATA.length;
  document.getElementById('cnt-aw').textContent=ks.aw;
  document.getElementById('cnt-am').textContent=ks.am;
  document.getElementById('cnt-ms').textContent=ks.ms;
  document.getElementById('cnt-na').textContent=ks.na;
  const tS=DATA.reduce((a,e)=>a+e.sales,0);
  const tT=DATA.reduce((a,e)=>a+e.target,0);
  const tP=tT>0?Math.round(tS/tT*100):0;
  document.getElementById('sb-agents').textContent=DATA.length;
  document.getElementById('sb-sales').textContent=tS;
  const pe=document.getElementById('sb-pct');
  pe.textContent=tP+'%';pe.style.color=pc(tP);
}
function mk(m){
  if(!m)return'';const l=m.toLowerCase();
  if(l.includes('abdulwahab'))return'aw';
  if(l.includes('ahmed'))return'am';
  if(l.includes('mohammed'))return'ms';
  if(l.includes('najwah'))return'na';
  return'other';
}

// ── View ─────────────────────────────────────────────────────
function setView(v,el){
  CURRENT_VIEW=v;FILTER='all';
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderView(v);
}

function renderView(view){
  const emps=view==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(view.toLowerCase()));
  const tS=emps.reduce((a,e)=>a+e.sales,0);
  const tT=emps.reduce((a,e)=>a+e.target,0);
  const tP=tT>0?Math.round(tS/tT*100):0;
  const top=[...emps].sort((a,b)=>b.sales-a.sales)[0];
  const active=emps.filter(e=>e.sales>0).length;
  const branches=[...new Set(emps.map(e=>e.branch))].filter(Boolean).sort();
  const supNames=[...new Set(emps.map(e=>e.mgr.split(' ')[0]))].filter(Boolean);

  document.getElementById('content').innerHTML=`
    <div class="search-wrap" style="position:relative">
      <span class="si">🔍</span>
      <input class="search-inp" id="sinp" placeholder="Search by name, username or branch..." oninput="doSearch(this.value)" autocomplete="off">

function renderSupCards(){

  ];
  return`<div class="sec-t">Supervisor overview</div>
  <div class="sup-grid">
    ${sups.map(s=>{
      const e=DATA.filter(d=>d.mgr.toLowerCase().includes(s.key.toLowerCase()));
      const tS=e.reduce((a,d)=>a+d.sales,0);
      const tT=e.reduce((a,d)=>a+d.target,0);
      const tP=tT>0?Math.round(tS/tT*100):0;

      return`<div class="sup-card" onclick="setView('${s.key}',null)">

function renderTable(emps, brFilter){
  let f=brFilter==='all'?emps:emps.filter(e=>e.branch===brFilter);
  if(SEARCH){const q=SEARCH.toLowerCase();f=f.filter(e=>e.name.toLowerCase().includes(q)||e.user.toLowerCase().includes(q)||e.branch.toLowerCase().includes(q));}
  const sorted=[...f].sort((a,b)=>b.sales-a.sales);
  document.getElementById('tbl-cnt').textContent=sorted.length+' agents';
  document.getElementById('tbl-rows').innerHTML=sorted.length?sorted.map((e,i)=>{
    const rk=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rc=i===0?'g':i===1?'s':i===2?'b':'';
    const eStr=encodeURIComponent(JSON.stringify(e));
    return`<div class="tbl-row ${rk}" onclick="openModal(decodeURIComponent('${eStr}'))">
      <span class="rk ${rc}">${i+1}</span>
      <div><div class="en">${e.name}</div><div class="eb">${e.branch}</div></div>
      <div class="esup">${e.mgr.split(' ')[0]}</div>
      <span class="nw">${e.sales}</span>
      <span class="nt">${e.target}</span>
      <span class="pv" style="color:${pc(e.pct)}">${e.pct}%</span>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,e.pct)}%;background:${pc(e.pct)}"></div></div>
        <div class="prog-t">${e.pct}%</div>
      </div>
    </div>`;
  }).join(''):'<div class="empty">No results found</div>';
}

function doFilter(br,el){
  FILTER=br;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  if(el)el.classList.add('on');
  const emps=CURRENT_VIEW==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(CURRENT_VIEW.toLowerCase()));
  renderTable(emps,br);
}

// ── Search ───────────────────────────────────────────────────
function doSearch(val){
  SEARCH=val;
  const res=document.getElementById('sres');
  if(!val||val.length<2){res.style.display='none';
    const emps=CURRENT_VIEW==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(CURRENT_VIEW.toLowerCase()));
    renderTable(emps,FILTER);return;
  }
  const q=val.toLowerCase();
  const matches=DATA.filter(e=>e.name.toLowerCase().includes(q)||e.user.toLowerCase().includes(q)||e.branch.toLowerCase().includes(q)).slice(0,7);
  res.style.display=matches.length?'block':'none';
  res.innerHTML=matches.map(e=>`
    <div class="s-item" onclick="openModal('${encodeURIComponent(JSON.stringify(e))}');document.getElementById('sres').style.display='none'">
      <div class="si-n">${e.name}</div>
      <div class="si-m">${e.user} · ${e.branch} · ${e.sales} sales (${e.pct}%)</div>
    </div>`).join('');
  const emps=CURRENT_VIEW==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(CURRENT_VIEW.toLowerCase()));
  renderTable(emps,FILTER);
}

// ── Charts ───────────────────────────────────────────────────
function renderCharts(emps,branches){
  const brData=branches.map(b=>{
    const be=emps.filter(e=>e.branch===b);
    return{b,s:be.reduce((a,e)=>a+e.sales,0),t:be.reduce((a,e)=>a+e.target,0)};
  }).sort((a,b)=>b.s-a.s).slice(0,12);

  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:brData.map(d=>d.b.replace(' FBO','').replace('Kiosk ','K.').replace(' RYD','').replace(' ALMASIF','')),
      datasets:[
        {label:'Sales',data:brData.map(d=>d.s),backgroundColor:'#3DD68C',borderRadius:5},
        {label:'Target',data:brData.map(d=>d.t),backgroundColor:'rgba(255,255,255,0.18)',borderRadius:5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9ACDB0',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#4A8A62',font:{size:10}},grid:{color:'rgba(61,214,140,0.05)'}},
        y:{ticks:{color:'#4A8A62',font:{size:10}},grid:{color:'rgba(61,214,140,0.05)'}}
      }
    }
  });

  const sups=[
    {l:'Abdulwahab',c:'#F6C94E'},{l:'Ahmed',c:'#85B7EB'},
    {l:'Mohammed',c:'#5DCAA5'},{l:'Najwah',c:'#ED93B1'}
  ];
  if(donutChart)donutChart.destroy();
  donutChart=new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{
      labels:sups.map(s=>s.l),
      datasets:[{
        data:sups.map(s=>emps.filter(e=>e.mgr.toLowerCase().includes(s.l.toLowerCase())).reduce((a,e)=>a+e.sales,0)),
        backgroundColor:sups.map(s=>s.c),
        borderWidth:2,borderColor:'#061A10'
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{position:'bottom',labels:{color:'#9ACDB0',font:{size:11},padding:10}}}
    }
  });
}
