<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salam — Sales Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --g1:#061A10;--g2:#0A2E1C;--g3:#0D3D26;--g4:#1A5C35;
  --g5:#1A9E52;--g6:#3DD68C;--g7:#6FD49A;
  --gold:#D4A017;--silver:#8FA0AE;--bronze:#B07030;
  --red:#E24B4A;--amber:#EF9F27;--blue:#378ADD;
  --t1:#fff;--t2:#9ACDB0;--t3:#4A8A62;--t4:#2A5A3A;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.08);
  --border:rgba(61,214,140,0.12);--border2:rgba(61,214,140,0.28);
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--g1);font-family:'Segoe UI',system-ui,sans-serif;color:var(--t1);min-height:100vh}

/* HEADER */
.hdr{background:var(--g3);border-bottom:1px solid var(--border2);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px}
.hdr-mid h1{font-size:14px;font-weight:600;color:#fff;text-align:center}
.hdr-mid p{font-size:11px;color:var(--g7);text-align:center;margin-top:2px}
.hdr-r{display:flex;gap:8px;align-items:center}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g7)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g6);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--g7)}
.btn-o:hover{background:var(--card2)}
.btn-g{background:var(--g5);color:#fff}
.btn-g:hover{background:var(--g6);color:var(--g1)}
.btn-gold{background:linear-gradient(135deg,#B8860B,#D4A017);color:#fff}
.btn-gold:hover{filter:brightness(1.15)}

/* LAYOUT */
.wrap{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:215px;flex-shrink:0;background:var(--g2);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.content{flex:1;padding:18px 22px;overflow:hidden;min-width:0}

/* SIDEBAR */
.sb-section{padding:0 10px;margin-bottom:18px}
.sb-lbl{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;font-size:12px;color:var(--t2);border:none;background:transparent;width:100%;text-align:left;transition:all .15s}
.sb-item:hover{background:var(--card);color:var(--t1)}
.sb-item.active{background:var(--card2);color:#fff;font-weight:600}
.sb-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--g5)}
.sb-cnt{margin-left:auto;font-size:10px;background:var(--card2);padding:2px 6px;border-radius:8px;color:var(--g7)}
.sb-div{height:1px;background:var(--border);margin:8px 10px}
.qs-v{font-size:20px;font-weight:700;color:#fff}
.qs-l{font-size:10px;color:var(--t3);margin-bottom:8px}

/* ══════════════════════════════════════
   PREMIUM INFOGRAPHIC KPI SECTION
══════════════════════════════════════ */
.kpi-section{margin-bottom:22px}

/* Row 1: 2 big metric cards side by side */
.kpi-row1{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
/* Row 2: top performer wide + agents narrow */
.kpi-row2{display:grid;grid-template-columns:2fr 1fr;gap:12px}

.mk{border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;border:1px solid transparent;transition:transform .2s}
.mk:hover{transform:translateY(-2px)}

/* Card variants */
.mk-sales {background:linear-gradient(135deg,#0D3D26 0%,#163D24 60%,#1A5C35 100%);border-color:rgba(61,214,140,0.3)}
.mk-ach   {background:linear-gradient(135deg,#0A1E0E 0%,#102A18 60%,#1A4A2A 100%);border-color:rgba(29,158,117,0.3)}
.mk-top   {background:linear-gradient(135deg,#1E1500 0%,#2E2000 60%,#3A2A00 100%);border-color:rgba(212,160,23,0.4)}
.mk-team  {background:linear-gradient(135deg,#0A1525 0%,#0F1E35 60%,#162844 100%);border-color:rgba(55,138,221,0.3)}

/* Accent line */
.mk::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mk-sales::before{background:linear-gradient(90deg,#1A9E52,#3DD68C,#1A9E52)}
.mk-ach::before  {background:linear-gradient(90deg,#0F6E56,#1D9E75,#3DD68C)}
.mk-top::before  {background:linear-gradient(90deg,#B8860B,#D4A017,#F6C94E)}
.mk-team::before {background:linear-gradient(90deg,#185FA5,#378ADD,#85B7EB)}

/* Big decorative number */
.mk-bg-num{position:absolute;right:-8px;bottom:-18px;font-size:80px;font-weight:900;opacity:.06;line-height:1;color:#fff;pointer-events:none;user-select:none}

.mk-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.mk-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mk-sales .mk-icon{background:rgba(61,214,140,0.14)}
.mk-ach   .mk-icon{background:rgba(29,158,117,0.14)}
.mk-top   .mk-icon{background:rgba(212,160,23,0.14)}
.mk-team  .mk-icon{background:rgba(55,138,221,0.14)}

.mk-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.mk-sales .mk-lbl{color:#5DC48A}
.mk-ach   .mk-lbl{color:#3DA87A}
.mk-top   .mk-lbl{color:#C8961A}
.mk-team  .mk-lbl{color:#4A88BB}

.mk-val{font-size:44px;font-weight:900;line-height:1;letter-spacing:-2px}
.mk-sales .mk-val{color:#fff}
.mk-ach   .mk-val{color:#3DD68C}
.mk-team  .mk-val{color:#85B7EB}

.mk-sub{font-size:11px;margin-top:4px;margin-bottom:14px;line-height:1.5}
.mk-sales .mk-sub{color:#4A8A62}
.mk-ach   .mk-sub{color:#3A7A56}
.mk-top   .mk-sub{color:#8A7020}
.mk-team  .mk-sub{color:#3A6080}

/* Segmented bar */
.mk-segs{display:flex;gap:3px;height:5px}
.mk-seg{flex:1;border-radius:2px;background:rgba(255,255,255,0.07)}
.mk-seg.on-g{background:#3DD68C}
.mk-seg.on-t{background:#1D9E75}
.mk-seg.on-gold{background:#D4A017}
.mk-seg.on-b{background:#378ADD}

/* Top performer special */
.mk-top-name{font-size:20px;font-weight:800;color:#F6C94E;line-height:1.2;margin:8px 0 4px}
.mk-top-branch{font-size:11px;color:#9A7820;margin-bottom:14px}
.mk-top-score{display:flex;align-items:baseline;gap:6px}
.mk-top-score-n{font-size:36px;font-weight:900;color:#F6C94E;letter-spacing:-1px}
.mk-top-score-l{font-size:12px;color:#9A7820}

/* Team card compact */
.mk-team-row{display:flex;justify-content:space-between;align-items:flex-end}
.mk-team-nums{display:flex;flex-direction:column;gap:2px}

/* ══════════════════════════════════════
   TOP 5 PODIUM
══════════════════════════════════════ */
.top5-section{margin-bottom:22px}
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:10px}
.pod-col{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s}
.pod-col:hover{transform:translateY(-3px)}

.pod-card{border-radius:12px 12px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:14px 10px 12px;transition:all .2s}
.pod-1 .pod-card{background:linear-gradient(180deg,#2A1E00,#1E1500);border:1px solid rgba(212,160,23,0.5);border-bottom:none;width:160px;height:140px}
.pod-2 .pod-card{background:linear-gradient(180deg,#1A2530,#121C28);border:1px solid rgba(55,138,221,0.35);border-bottom:none;width:135px;height:110px}
.pod-3 .pod-card{background:linear-gradient(180deg,#231510,#18100B);border:1px solid rgba(176,112,48,0.35);border-bottom:none;width:120px;height:88px}
.pod-4 .pod-card,.pod-5 .pod-card{background:linear-gradient(180deg,#0F2A18,#0A2014);border:1px solid rgba(61,214,140,0.2);border-bottom:none;width:110px;height:72px}

.pod-base{height:6px;border-radius:0 0 8px 8px}
.pod-1 .pod-base{background:#D4A017;width:160px}
.pod-2 .pod-base{background:#8FA0AE;width:135px}
.pod-3 .pod-base{background:#B07030;width:120px}
.pod-4 .pod-base,.pod-5 .pod-base{background:#1A9E52;width:110px}

.pod-crown{font-size:18px;margin-bottom:3px;line-height:1}
.pod-rank-lbl{font-size:10px;font-weight:700;margin-bottom:5px}
.pod-1 .pod-rank-lbl{color:#D4A017}
.pod-2 .pod-rank-lbl{color:#8FA0AE}
.pod-3 .pod-rank-lbl{color:#B07030}
.pod-4 .pod-rank-lbl,.pod-5 .pod-rank-lbl{color:#3DD68C}

.pod-name{font-size:11px;font-weight:700;color:#fff;text-align:center;line-height:1.3;margin-bottom:3px}
.pod-branch{font-size:9px;text-align:center;margin-bottom:6px}
.pod-1 .pod-branch{color:#9A7820}
.pod-2 .pod-branch{color:#4A7090}
.pod-3 .pod-branch{color:#7A4820}
.pod-4 .pod-branch,.pod-5 .pod-branch{color:#3A7A56}

.pod-score{font-size:26px;font-weight:900;line-height:1}
.pod-1 .pod-score{color:#F6C94E}
.pod-2 .pod-score{color:#A8C0D0}
.pod-3 .pod-score{color:#D09060}
.pod-4 .pod-score,.pod-5 .pod-score{color:#3DD68C}

.pod-score-lbl{font-size:9px;margin-top:1px;color:rgba(255,255,255,0.4)}

/* ══════════════════════════════════════
   CHARTS + REST
══════════════════════════════════════ */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:18px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.chart-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}

/* Horizontal bar supervisor chart */
.sup-bars{display:flex;flex-direction:column;gap:12px}
.sup-bar-row{display:flex;flex-direction:column;gap:5px}
.sup-bar-hdr{display:flex;justify-content:space-between;align-items:center}
.sup-bar-name{font-size:12px;font-weight:600;color:#fff}
.sup-bar-nums{font-size:11px;color:var(--t2)}
.sup-bar-track{height:10px;background:rgba(255,255,255,0.07);border-radius:5px;overflow:hidden}
.sup-bar-fill{height:100%;border-radius:5px;transition:width .8s ease}

/* SUPERVISOR CARDS */
.sup-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
.sup-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;cursor:pointer;transition:all .2s}
.sup-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.sup-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.sup-meta{font-size:11px;color:var(--t3);margin-bottom:10px}
.sup-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sup-nv{font-size:18px;font-weight:700;color:#fff;text-align:center}
.sup-nl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-top:2px}
.sup-pbar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:10px;overflow:hidden}
.sup-pbar-fill{height:100%;border-radius:2px}

/* SECTION TITLE */
.sec-t{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}

/* FILTER PILLS */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--border2);color:var(--t1)}
.pill.on{background:var(--g5);color:#fff;border-color:var(--g5);font-weight:600}

/* TABLE */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tbl-hdr{padding:11px 18px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.tbl-cnt{font-size:11px;color:var(--t3)}
.tbl-head{display:grid;grid-template-columns:28px 2fr 1fr 70px 70px 70px 120px;gap:8px;padding:8px 18px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border)}
.th{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.06em}
.thc{text-align:center}.thr{text-align:right}
.tbl-row{display:grid;grid-template-columns:28px 2fr 1fr 70px 70px 70px 120px;gap:8px;padding:11px 18px;border-bottom:1px solid rgba(61,214,140,0.05);align-items:center;transition:background .12s;cursor:pointer}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--card2)}
.tbl-row.r1{background:rgba(212,160,23,.06)}
.tbl-row.r2{background:rgba(143,160,174,.04)}
.tbl-row.r3{background:rgba(176,112,48,.04)}
.rk{font-size:11px;font-weight:700;color:var(--t3);text-align:center}
.rk.g{color:var(--gold)}.rk.s{color:var(--silver)}.rk.b{color:var(--bronze)}
.en{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eb{font-size:10px;color:var(--t3);margin-top:1px}
.esup{font-size:11px;color:#7DD99A;font-weight:500}
.nw{font-size:14px;font-weight:700;color:#fff;text-align:center}
.nt{font-size:12px;color:#aaa;text-align:center}
.pv{font-size:12px;font-weight:600;text-align:center}
.prog{display:flex;flex-direction:column;gap:3px}
.prog-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s}
.prog-t{font-size:10px;color:var(--t2);text-align:right}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.sinp{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(61,214,140,0.35);border-radius:var(--r2);padding:10px 14px 10px 36px;font-size:13px;color:#fff;outline:none;transition:all .2s}
.sinp:focus{border-color:var(--g6);background:rgba(255,255,255,0.11)}
.sinp::placeholder{color:#5A9A72}
.sicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
.sres{background:var(--g3);border:1px solid var(--border2);border-radius:var(--r2);margin-top:4px;overflow:hidden;display:none;position:absolute;width:100%;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.sitem{padding:10px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;align-items:center;justify-content:space-between}
.sitem:hover{background:var(--card2)}
.sitem:last-child{border-bottom:none}
.si-left .si-n{font-weight:600;color:#fff;font-size:13px}
.si-left .si-m{font-size:10px;color:var(--t3);margin-top:2px}
.si-score{font-size:18px;font-weight:700;color:#3DD68C}

/* EXPORT PANEL */
.export-panel{background:linear-gradient(135deg,#1A3D10,#0D2E1C);border:1px solid rgba(212,160,23,0.3);border-radius:var(--r);padding:16px 20px;margin-bottom:18px}
.ep-title{font-size:11px;font-weight:700;color:#B89020;text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.ep-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.ep-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
.ep-label{font-size:10px;color:#8A7030;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.ep-select{background:rgba(255,255,255,0.07);border:1px solid rgba(212,160,23,0.25);border-radius:var(--r2);padding:8px 12px;font-size:12px;color:#fff;outline:none;cursor:pointer}
.ep-select option{background:#0D3D26}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#0D3D26;border:1px solid rgba(61,214,140,0.3);border-radius:16px;padding:26px;width:100%;max-width:500px;position:relative;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.08);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,0.18)}

/* HIDDEN REPORT */
#branch-report{position:fixed;top:-9999px;left:-9999px;width:820px;background:#0A2E1C;font-family:Segoe UI,system-ui,sans-serif;color:#fff}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--g6);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--t3);font-size:13px}

@media(max-width:1100px){
  .sidebar{display:none}.kpi-row1,.kpi-row2{grid-template-columns:1fr}
  .charts-row{grid-template-columns:1fr}
  .tbl-head,.tbl-row{grid-template-columns:28px 1fr 70px 100px}
  .tbl-head>:nth-child(n+3):not(:nth-child(4)):not(:nth-child(7)),
  .tbl-row>:nth-child(n+3):not(:nth-child(4)):not(:nth-child(7)){display:none}
  .podium-wrap{gap:5px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">salam</div>
  <div class="hdr-mid">
    <h1>Sales Performance Dashboard</h1>
    <p id="hdr-sub">Loading...</p>
  </div>
  <div class="hdr-r">
    <div class="live"><span class="dot"></span><span id="live-lbl">Live</span></div>
    <button class="btn btn-o" onclick="loadData()">↻ Refresh</button>
    <button class="btn btn-g" onclick="exportPNG()">↓ PNG</button>
  </div>
</div>

<div class="wrap">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-lbl">Views</div>
      <button class="sb-item active" onclick="setView('all',this)">
        <span class="sb-d"></span>All Supervisors<span class="sb-cnt" id="cnt-all">—</span>
      </button>
      <button class="sb-item" onclick="setView('Abdulwahab',this)">
        <span class="sb-d" style="background:#F6C94E"></span>Abdulwahab<span class="sb-cnt" id="cnt-aw">—</span>
      </button>
      <button class="sb-item" onclick="setView('Ahmed',this)">
        <span class="sb-d" style="background:#85B7EB"></span>Ahmed<span class="sb-cnt" id="cnt-am">—</span>
      </button>
      <button class="sb-item" onclick="setView('Mohammed',this)">
        <span class="sb-d" style="background:#5DCAA5"></span>Mohammed<span class="sb-cnt" id="cnt-ms">—</span>
      </button>
      <button class="sb-item" onclick="setView('Najwah',this)">
        <span class="sb-d" style="background:#ED93B1"></span>Najwah<span class="sb-cnt" id="cnt-na">—</span>
      </button>
    </div>
    <div class="sb-div"></div>
    <div class="sb-section">
      <div class="sb-lbl">Quick stats</div>
      <div style="padding:6px 8px">
        <div class="qs-l">Total agents</div>
        <div class="qs-v" id="sb-agents">—</div>
        <div class="qs-l" style="margin-top:10px">Team sales</div>
        <div class="qs-v" style="color:var(--g6)" id="sb-sales">—</div>
        <div class="qs-l" style="margin-top:10px">Achievement</div>
        <div class="qs-v" id="sb-pct">—</div>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spin"></div><p>Connecting to Google Sheets...</p></div>
  </div>
</div>

<div id="branch-report"></div>

<script>
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQzH2quWsRx-NsAhxFeqOsz9n_KElh80hZq64gnjviHC0OGVSXTGgQIC7HbhazVChH7Cde__gKhnQut/pub?gid=59746245&single=true&output=csv';
let DATA=[],CUR='all',SEARCH='',FILT='all';
let barChart=null;

async function loadData(){
  document.getElementById('live-lbl').textContent='Updating...';
  try{
    const r=await fetch(CSV+'&t='+Date.now());
    const txt=await r.text();
    DATA=parseCSV(txt);
    if(!DATA.length)throw new Error('empty');
    updateSidebar();
    renderView(CUR);
    document.getElementById('live-lbl').textContent='Live';
    document.getElementById('hdr-sub').textContent=
      'April 2026 · '+DATA.length+' agents · '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('live-lbl').textContent='Error';
    document.getElementById('content').innerHTML=
      '<div class="empty">⚠️ Could not load data.<button class="btn btn-o" style="margin-left:10px" onclick="loadData()">Retry</button></div>';
  }
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');
  if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  return lines.slice(1).map(l=>{
    const c=splitLine(l);
    const o={};
    hdrs.forEach((h,j)=>o[h]=(c[j]||'').replace(/"/g,'').trim());
    const name=o['employee name']||o['name']||'';
    const mgr=o['manager']||'';
    if(!name||!mgr||name.length<2||name.toLowerCase().includes('auto'))return null;
    const target=parseFloat(o['target']||0)||0;
    const sales=parseFloat(o['user sales']||o['achieved']||0)||0;
    return{name,user:o['user']||'',mgr,
      branch:o['branch name']||o['branch']||'',
      opco:o['operating company']||'',
      target,sales,pct:target>0?Math.round(sales/target*100):0};
  }).filter(Boolean);
}

function splitLine(l){
  const r=[];let c='';let q=false;
  for(let i=0;i<l.length;i++){
    if(l[i]==='"')q=!q;
    else if(l[i]===','&&!q){r.push(c);c='';}
    else c+=l[i];
  }
  r.push(c);return r;
}

function updateSidebar(){
  const k={aw:0,am:0,ms:0,na:0};
  DATA.forEach(e=>{const m=mk(e.mgr);if(k[m]!==undefined)k[m]++;});
  document.getElementById('cnt-all').textContent=DATA.length;
  document.getElementById('cnt-aw').textContent=k.aw;
  document.getElementById('cnt-am').textContent=k.am;
  document.getElementById('cnt-ms').textContent=k.ms;
  document.getElementById('cnt-na').textContent=k.na;
  const tS=DATA.reduce((a,e)=>a+e.sales,0);
  const tT=DATA.reduce((a,e)=>a+e.target,0);
  const tP=tT>0?Math.round(tS/tT*100):0;
  document.getElementById('sb-agents').textContent=DATA.length;
  document.getElementById('sb-sales').textContent=tS;
  const pe=document.getElementById('sb-pct');
  pe.textContent=tP+'%';pe.style.color=pc(tP);
}

function mk(m){
  if(!m)return'';const l=m.toLowerCase();
  if(l.includes('abdulwahab'))return'aw';
  if(l.includes('ahmed'))return'am';
  if(l.includes('mohammed'))return'ms';
  if(l.includes('najwah'))return'na';
  return'other';
}

function setView(v,el){
  CUR=v;FILT='all';SEARCH='';
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderView(v);
}

function pc(p){return p>=75?'#1A9E52':p>=50?'#3DBB72':p>=25?'#EF9F27':'#E24B4A'}

function segs(n,cls){
  return Array.from({length:n},(_,i)=>`<div class="mk-seg ${i<Math.round(Math.min(100,0)/5)?cls:''}"></div>`).join('');
}

function makeSegs(pct,cls,total=20){
  const filled=Math.round(Math.min(100,pct)/100*total);
  return Array.from({length:total},(_,i)=>
    `<div class="mk-seg ${i<filled?cls:''}"></div>`
  ).join('');
}

function renderView(view){
  const emps=view==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(view.toLowerCase()));
  const tS=emps.reduce((a,e)=>a+e.sales,0);
  const tT=emps.reduce((a,e)=>a+e.target,0);
  const tP=tT>0?Math.round(tS/tT*100):0;
  const sorted=[...emps].sort((a,b)=>b.sales-a.sales);
  const top=sorted[0];
  const active=emps.filter(e=>e.sales>0).length;
  const branches=[...new Set(emps.map(e=>e.branch))].filter(Boolean).sort();

  document.getElementById('content').innerHTML=`
    <!-- SEARCH -->
    <div class="search-wrap">
      <span class="sicon">🔍</span>
      <input class="sinp" id="sinp" placeholder="Search by name, username or branch..." oninput="doSearch(this.value)" autocomplete="off">
      <div class="sres" id="sres"></div>
    </div>

    <!-- PREMIUM KPI -->
    <div class="kpi-section">
      <div class="kpi-row1">
        <div class="mk mk-sales">
          <div class="mk-bg-num">${tS}</div>
          <div class="mk-header">
            <div>
              <div class="mk-lbl">Total sales</div>
            </div>
            <div class="mk-icon">📊</div>
          </div>
          <div class="mk-val">${tS}</div>
          <div class="mk-sub">of <b style="color:#7DD99A">${tT}</b> target · <b style="color:${pc(tP)}">${tP}%</b> achieved</div>
          <div class="mk-segs">${makeSegs(tP,'on-g')}</div>
        </div>
        <div class="mk mk-ach">
          <div class="mk-bg-num">${tP}</div>
          <div class="mk-header">
            <div><div class="mk-lbl">Achievement</div></div>
            <div class="mk-icon">🎯</div>
          </div>
          <div class="mk-val" style="color:${pc(tP)}">${tP}%</div>
          <div class="mk-sub"><b style="color:#E24B4A">${tT-tS}</b> remaining · <b style="color:#3DD68C">${active}</b> active agents</div>
          <div class="mk-segs">${makeSegs(tP,'on-t')}</div>
        </div>
      </div>
      <div class="kpi-row2">
        <div class="mk mk-top">
          <div class="mk-bg-num">★</div>
          <div class="mk-header" style="margin-bottom:6px">
            <div><div class="mk-lbl">🏆 Top performer</div></div>
            <div class="mk-icon">👑</div>
          </div>
          <div class="mk-top-name">${top?top.name:'—'}</div>
          <div class="mk-top-branch">${top?top.branch+' · '+top.mgr.split(' ')[0]:''}</div>
          <div class="mk-top-score">
            <div class="mk-top-score-n">${top?top.sales:0}</div>
            <div class="mk-top-score-l">sales · ${top?top.pct:0}% of target</div>
          </div>
          <div class="mk-segs" style="margin-top:14px">${makeSegs(top?top.pct:0,'on-gold')}</div>
        </div>
        <div class="mk mk-team">
          <div class="mk-bg-num">${emps.length}</div>
          <div class="mk-header" style="margin-bottom:8px">
            <div><div class="mk-lbl">Team</div></div>
            <div class="mk-icon">👥</div>
          </div>
          <div class="mk-team-row">
            <div class="mk-team-nums">
              <div style="font-size:36px;font-weight:900;color:#85B7EB;letter-spacing:-1px;line-height:1">${active}</div>
              <div style="font-size:11px;color:#3A6080;margin-top:3px">active of <b style="color:#85B7EB">${emps.length}</b></div>
            </div>
          </div>
          <div style="font-size:11px;color:#3A6080;margin-top:8px;margin-bottom:12px">
            <b style="color:#E24B4A">${emps.length-active}</b> agents with zero sales
          </div>
          <div class="mk-segs">${makeSegs(Math.round(active/emps.length*100),'on-b')}</div>
        </div>
      </div>
    </div>

    <!-- TOP 5 PODIUM -->
    <div class="top5-section">
      <div class="sec-t">Top 5 performers · all branches</div>
      ${renderTop5(sorted)}
    </div>

    ${view==='all'?renderSupCards():''}

    <!-- CHARTS -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Branch performance — sales vs target</div>
        <div style="position:relative;height:220px"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Sales by supervisor</div>
        <div class="sup-bars" id="sup-bars"></div>
      </div>
    </div>

    <!-- EXPORT -->
    <div class="export-panel">
      <div class="ep-title">📤 Export branch report</div>
      <div class="ep-row">
        <div class="ep-group">
          <div class="ep-label">Supervisor</div>
          <select class="ep-select" id="ep-sup" onchange="fillBranchSel()">
            <option value="">— Select —</option>
            ${[...new Set(DATA.map(e=>e.mgr))].filter(Boolean).map(s=>`<option value="${s}">${s.split(' ')[0]}</option>`).join('')}
          </select>
        </div>
        <div class="ep-group">
          <div class="ep-label">Branch</div>
          <select class="ep-select" id="ep-br"><option value="">— Select —</option></select>
        </div>
        <button class="btn btn-gold" onclick="exportBranchReport()" style="height:36px;padding:0 20px;flex-shrink:0">📸 Export PNG</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="sec-t">Employee leaderboard</div>
    <div class="filter-row" id="fpills">
      <button class="pill on" onclick="doFilter('all',this)">All branches</button>
      ${branches.map(b=>`<button class="pill" onclick="doFilter('${b.replace(/'/g,"\\'")}',this)">${b}</button>`).join('')}
    </div>
    <div class="table-card">
      <div class="tbl-hdr">
        <span class="tbl-title">Ranked by sales</span>
        <span class="tbl-cnt" id="tbl-cnt">${emps.length} agents</span>
      </div>
      <div class="tbl-head">
        <span class="th thc">#</span><span class="th">Name</span>
        <span class="th">Supervisor</span>
        <span class="th thc">Sales</span><span class="th thc">Target</span>
        <span class="th thc">Ach%</span><span class="th thr">Progress</span>
      </div>
      <div id="tbl-rows"></div>
    </div>
    <div style="font-size:11px;color:var(--t4);text-align:center;margin-top:10px;padding-bottom:20px">
      Auto-refresh every 5 min
    </div>
  `;

  renderTable(emps,'all');
  renderBarChart(emps,branches);
  renderSupBars(emps);
}

function renderTop5(sorted){
  const top5=sorted.slice(0,5);
  const maxS=top5[0]?top5[0].sales:1;
  const order=[1,0,2,3,4];
  const labels=['1st','2nd','3rd','4th','5th'];
  const cols=['pod-1','pod-2','pod-3','pod-4','pod-5'];
  const crowns=['👑','','','',''];
  const display=[top5[1],top5[0],top5[2],top5[3],top5[4]].filter(Boolean);
  const dispCols=['pod-2','pod-1','pod-3','pod-4','pod-5'];
  const dispLabels=['2nd','1st','3rd','4th','5th'];
  const dispCrowns=['','👑','','',''];

  return`<div class="podium-wrap">
    ${display.map((e,i)=>{
      const gIdx=DATA.findIndex(d=>d.user===e.user&&d.name===e.name);
      return`<div class="${dispCols[i]} pod-col" onclick="openModal(${gIdx})">
        <div style="font-size:${i===1?'20px':'0px'};margin-bottom:${i===1?'4px':'0'};text-align:center">${dispCrowns[i]}</div>
        <div class="pod-card">
          <div class="pod-rank-lbl">${dispLabels[i]}</div>
          <div class="pod-name">${e.name.split(' ').slice(0,2).join(' ')}</div>
          <div class="pod-branch">${e.branch.replace(' FBO','')}</div>
          <div class="pod-score">${e.sales}</div>
          <div class="pod-score-lbl">sales</div>
        </div>
        <div class="pod-base"></div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderSupCards(){
  const sups=[
    {key:'Abdulwahab',color:'#F6C94E'},
    {key:'Ahmed',     color:'#85B7EB'},
    {key:'Mohammed',  color:'#5DCAA5'},
    {key:'Najwah',    color:'#ED93B1'},
  ];
  return`<div class="sec-t">Supervisor overview</div>
  <div class="sup-grid">
    ${sups.map(s=>{
      const e=DATA.filter(d=>d.mgr.toLowerCase().includes(s.key.toLowerCase()));
      const tS=e.reduce((a,d)=>a+d.sales,0);
      const tT=e.reduce((a,d)=>a+d.target,0);
      const tP=tT>0?Math.round(tS/tT*100):0;
      const br=[...new Set(e.map(d=>d.branch))].filter(Boolean).length;
      return`<div class="sup-card" onclick="setView('${s.key}',null)">
        <div class="sup-name">${s.key}</div>
        <div class="sup-meta">${e.length} agents · ${br} branches</div>
        <div class="sup-nums">
          <div><div class="sup-nv">${tS}</div><div class="sup-nl">Sales</div></div>
          <div><div class="sup-nv">${tT}</div><div class="sup-nl">Target</div></div>
          <div><div class="sup-nv" style="color:${pc(tP)}">${tP}%</div><div class="sup-nl">Ach%</div></div>
        </div>
        <div class="sup-pbar"><div class="sup-pbar-fill" style="width:${Math.min(100,tP)}%;background:${s.color}"></div></div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderSupBars(emps){
  const sups=[
    {key:'Abdulwahab',color:'#F6C94E'},
    {key:'Ahmed',     color:'#85B7EB'},
    {key:'Mohammed',  color:'#5DCAA5'},
    {key:'Najwah',    color:'#ED93B1'},
  ];
  const maxS=Math.max(...sups.map(s=>emps.filter(e=>e.mgr.toLowerCase().includes(s.key.toLowerCase())).reduce((a,e)=>a+e.sales,0)));
  document.getElementById('sup-bars').innerHTML=sups.map(s=>{
    const e=emps.filter(d=>d.mgr.toLowerCase().includes(s.key.toLowerCase()));
    const tS=e.reduce((a,d)=>a+d.sales,0);
    const tT=e.reduce((a,d)=>a+d.target,0);
    const tP=tT>0?Math.round(tS/tT*100):0;
    const w=maxS>0?Math.round(tS/maxS*100):0;
    return`<div class="sup-bar-row">
      <div class="sup-bar-hdr">
        <span class="sup-bar-name">${s.key}</span>
        <span class="sup-bar-nums"><b style="color:${s.color}">${tS}</b> · ${tP}%</span>
      </div>
      <div class="sup-bar-track"><div class="sup-bar-fill" style="width:${w}%;background:${s.color}"></div></div>
    </div>`;
  }).join('');
}

function renderTable(emps,brF){
  let f=brF==='all'?emps:emps.filter(e=>e.branch===brF);
  if(SEARCH){const q=SEARCH.toLowerCase();f=f.filter(e=>e.name.toLowerCase().includes(q)||e.user.toLowerCase().includes(q)||e.branch.toLowerCase().includes(q));}
  const sorted=[...f].sort((a,b)=>b.sales-a.sales);
  document.getElementById('tbl-cnt').textContent=sorted.length+' agents';
  document.getElementById('tbl-rows').innerHTML=sorted.length?sorted.map((e,i)=>{
    const rk=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rc=i===0?'g':i===1?'s':i===2?'b':'';
    const gIdx=DATA.findIndex(d=>d.user===e.user&&d.name===e.name);
    return`<div class="tbl-row ${rk}" onclick="openModal(${gIdx})">
      <span class="rk ${rc}">${i+1}</span>
      <div><div class="en">${e.name}</div><div class="eb">${e.branch}</div></div>
      <div class="esup">${e.mgr.split(' ')[0]}</div>
      <span class="nw">${e.sales}</span><span class="nt">${e.target}</span>
      <span class="pv" style="color:${pc(e.pct)}">${e.pct}%</span>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,e.pct)}%;background:${pc(e.pct)}"></div></div>
        <div class="prog-t">${e.pct}%</div>
      </div>
    </div>`;
  }).join(''):'<div class="empty">No results found</div>';
}

function doFilter(br,el){
  FILT=br;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  if(el)el.classList.add('on');
  const emps=CUR==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(CUR.toLowerCase()));
  renderTable(emps,br);
}

function doSearch(val){
  SEARCH=val;
  const res=document.getElementById('sres');
  const emps=CUR==='all'?DATA:DATA.filter(e=>e.mgr.toLowerCase().includes(CUR.toLowerCase()));
  if(!val||val.length<2){res.style.display='none';renderTable(emps,FILT);return;}
  const q=val.toLowerCase();
  const matches=DATA.filter(e=>
    e.name.toLowerCase().includes(q)||e.user.toLowerCase().includes(q)||e.branch.toLowerCase().includes(q)
  ).slice(0,8);
  if(!matches.length){res.style.display='none';}
  else{
    res.style.display='block';
    res.innerHTML=matches.map(e=>{
      const gIdx=DATA.findIndex(d=>d.user===e.user&&d.name===e.name);
      return`<div class="sitem" onclick="openModal(${gIdx});document.getElementById('sres').style.display='none';document.getElementById('sinp').value=''">
        <div class="si-left">
          <div class="si-n">${e.name}</div>
          <div class="si-m">${e.user} · ${e.branch} · ${e.mgr.split(' ')[0]}</div>
        </div>
        <div class="si-score">${e.sales}</div>
      </div>`;
    }).join('');
  }
  renderTable(emps,FILT);
}

function openModal(idx){
  const e=DATA[idx];
  if(!e)return;
  document.getElementById('emp-modal')?.remove();
  const rank=[...DATA].sort((a,b)=>b.sales-a.sales).findIndex(d=>d.user===e.user&&d.name===e.name)+1;
  const brE=DATA.filter(d=>d.branch===e.branch).sort((a,b)=>b.sales-a.sales);
  const brRank=brE.findIndex(d=>d.user===e.user&&d.name===e.name)+1;
  const brTotal=brE.reduce((a,d)=>a+d.sales,0);
  const ini=e.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  const modal=document.createElement('div');
  modal.id='emp-modal';modal.className='modal-bg';
  modal.onclick=ev=>{if(ev.target===modal)modal.remove()};
  modal.innerHTML=`
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('emp-modal').remove()">✕</button>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div style="width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#1A9E52,#3DD68C);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0">${ini}</div>
        <div>
          <div style="font-size:17px;font-weight:700;color:#fff">${e.name}</div>
          <div style="font-size:12px;color:#6FD49A;margin-top:3px">${e.user}</div>
        </div>
        ${rank<=5?`<div style="margin-left:auto;background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.4);border-radius:8px;padding:6px 12px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:#F6C94E">#${rank}</div>
          <div style="font-size:9px;color:#9A7820;text-transform:uppercase">Overall</div>
        </div>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${ib('Branch',e.branch,'#fff')}
        ${ib('Supervisor',e.mgr.split(' ')[0],'#7DD99A')}
        ${ib('Company',e.opco||'—','#fff')}
        ${ib('Branch rank','#'+brRank+' of '+brE.length,brRank===1?'#F6C94E':'#fff')}
      </div>
      <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:18px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px">
          <div><div style="font-size:9px;color:#4A8A62;text-transform:uppercase;font-weight:700;letter-spacing:.07em;margin-bottom:5px">Sales</div>
            <div style="font-size:38px;font-weight:900;color:#fff;letter-spacing:-1px">${e.sales}</div></div>
          <div style="text-align:right"><div style="font-size:9px;color:#4A8A62;text-transform:uppercase;font-weight:700;letter-spacing:.07em;margin-bottom:5px">Target</div>
            <div style="font-size:38px;font-weight:900;color:#fff;letter-spacing:-1px">${e.target}</div></div>
        </div>
        <div style="height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,e.pct)}%;background:${pc(e.pct)};border-radius:5px;transition:width .8s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <div style="font-size:11px;color:#7DD99A">${e.sales} of ${e.target}</div>
          <div style="font-size:16px;font-weight:800;color:${pc(e.pct)}">${e.pct}%</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:9px;color:#4A8A62;text-transform:uppercase;font-weight:700;letter-spacing:.07em;margin-bottom:6px">Branch contribution</div>
        <div style="font-size:28px;font-weight:800;color:#3DD68C">${brTotal>0?Math.round(e.sales/brTotal*100):0}%</div>
        <div style="font-size:11px;color:#3A7A56;margin-top:2px">of ${brTotal} branch sales</div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function ib(label,value,color){
  return`<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:12px">
    <div style="font-size:9px;color:#4A8A62;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:5px">${label}</div>
    <div style="font-size:14px;font-weight:600;color:${color}">${value}</div>
  </div>`;
}

function renderBarChart(emps,branches){
  const brData=branches.map(b=>{
    const be=emps.filter(e=>e.branch===b);
    return{b,s:be.reduce((a,e)=>a+e.sales,0),t:be.reduce((a,e)=>a+e.target,0)};
  }).sort((a,b)=>b.s-a.s).slice(0,12);
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:brData.map(d=>d.b.replace(' FBO','').replace(' RYD','').replace('Kiosk ','K.').replace(' ALMASIF','')),
      datasets:[
        {label:'Sales',data:brData.map(d=>d.s),backgroundColor:'#3DD68C',borderRadius:5},
        {label:'Target',data:brData.map(d=>d.t),backgroundColor:'rgba(255,255,255,0.15)',borderRadius:5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9ACDB0',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#4A8A62',font:{size:10}},grid:{color:'rgba(61,214,140,0.05)'}},
        y:{ticks:{color:'#4A8A62',font:{size:10}},grid:{color:'rgba(61,214,140,0.05)'}}
      }
    }
  });
}

function fillBranchSel(){
  const sup=document.getElementById('ep-sup').value;
  const brs=[...new Set(DATA.filter(e=>e.mgr===sup).map(e=>e.branch))].filter(Boolean).sort();
  document.getElementById('ep-br').innerHTML=
    '<option value="">— Select branch —</option>'+
    brs.map(b=>`<option value="${b}">${b}</option>`).join('');
}

async function exportBranchReport(){

        <div style="height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:10px"><div style="height:100%;width:${bw(tP)}%;background:linear-gradient(90deg,#1A9E52,#3DD68C);border-radius:2px"></div></div>

      <div style="background:linear-gradient(135deg,#0A2415,#1A4A25);border:1px solid rgba(61,214,140,0.2);border-radius:12px;padding:16px">

  await new Promise(r=>setTimeout(r,300));

  report.style.cssText='position:fixed;top:-9999px;left:-9999px;width:820px';
