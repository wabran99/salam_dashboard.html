function renderFamePanel(){
  const body=document.getElementById('panel-fame-body');
  if(!DATA.length){body.innerHTML='<div class="panel-empty">Loading...</div>';return;}
  const valid=DATA.filter(e=>e.target>0&&e.name!=='User_Mapping_Master');
  // 1. Employee of the Month (highest %)
  const champ=[...valid].sort((a,b)=>b.pct-a.pct||b.sales-a.sales)[0];
  // 2. Top Seller (highest absolute sales)
  const topSeller=[...valid].sort((a,b)=>b.sales-a.sales)[0];
  // 3. Overachiever (highest % above 100%)
  const overachievers=valid.filter(e=>e.pct>=100).sort((a,b)=>b.pct-a.pct);
  const overKing=overachievers[0];
  // 4. Postpaid King
  const postKing=[...valid].sort((a,b)=>(b.post||0)-(a.post||0))[0];
  // 5. Rising Star (high % with lower target — proven potential)
  const rising=[...valid].filter(e=>e.target<=50&&e.pct>=80).sort((a,b)=>b.pct-a.pct)[0];
  // 6. Consistency (steady achievement 50-85% — reliable)
  const consistent=[...valid].filter(e=>e.pct>=50&&e.pct<=85&&e.sales>=10).sort((a,b)=>b.sales-a.sales)[0];
  const awards=[
    {key:'champ',emp:champ,award:'👑',title:'Employee of the Month',subtitle:'Highest achievement %',color:'#F6C94E',statLabel:'Achievement'},
    {key:'top',emp:topSeller,award:'💰',title:'Top Seller',subtitle:'Most sales overall',color:'#5DD88C',statLabel:'Total Sales'},
    {key:'over',emp:overKing,award:'🚀',title:'Overachiever',subtitle:'Exceeded target',color:'#F6C94E',statLabel:'Achievement'},
    {key:'post',emp:postKing,award:'📱',title:'Postpaid King',subtitle:'Top postpaid sales',color:'#A8CCEE',statLabel:'Postpaid Sales'},
    {key:'rising',emp:rising,award:'⭐',title:'Rising Star',subtitle:'High % on smaller target',color:'#ED93B1',statLabel:'Achievement'},
    {key:'consistent',emp:consistent,award:'🎯',title:'Consistency Champion',subtitle:'Reliable performer',color:'#85B7EB',statLabel:'Total Sales'}
  ].filter(a=>a.emp);
  if(!awards.length){
    body.innerHTML='<div class="panel-empty"><div class="panel-empty-icon">🏆</div>Awards coming soon...<br><span style="font-size:11px;opacity:0.7">Need more data</span></div>';
    return;
  }
  body.innerHTML=awards.map(a=>{
    const e=a.emp;
    const gIdx=DATA.findIndex(d=>d.user===e.user&&d.name===e.name);
    let statValue;
    if(a.statLabel==='Achievement')statValue=e.pct+'%';
    else if(a.statLabel==='Total Sales')statValue=e.sales;
    else if(a.statLabel==='Postpaid Sales')statValue=e.post||0;
    return`<div class="fame-card" onclick="closePanel();setTimeout(()=>openModal(${gIdx}),300)">
      <div class="fame-card-hdr">
        <div class="fame-award">${a.award}</div>
        <div class="fame-award-info">
          <div class="fame-award-title" style="color:${a.color}">${a.title}</div>
          <div class="fame-award-subtitle">${a.subtitle}</div>
        </div>
      </div>
      <div class="fame-name">${e.name}</div>
      <div class="fame-branch">${e.branch} · ${mgrShort(e.mgr)}</div>
      <div class="fame-stats">
        <div class="fame-stat"><div class="fame-stat-v" style="color:${a.color}">${statValue}</div><div class="fame-stat-l">${a.statLabel}</div></div>
        <div class="fame-stat"><div class="fame-stat-v" style="color:#fff">${e.sales}</div><div class="fame-stat-l">Sales</div></div>
        <div class="fame-stat"><div class="fame-stat-v" style="color:#fff">${e.target}</div><div class="fame-stat-l">Target</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Live Ticker logic ──
function renderTicker(){
  if(!DATA.length){
    document.getElementById('ticker-wrap').style.display='none';
    return;
  }
  const items=[];
  const valid=DATA.filter(e=>e.target>0&&e.name!=='User_Mapping_Master');
  // Top performer
  const top=[...valid].sort((a,b)=>b.pct-a.pct||b.sales-a.sales)[0];
  if(top){
    items.push({cls:'fire',icon:'🔥',text:`<b>${top.name.split(' ').slice(0,2).join(' ')}</b> leads with ${top.pct}% achievement`});
  }
  // Team milestone
  const tS=DATA.reduce((a,e)=>a+e.sales,0);
  const tT=DATA.reduce((a,e)=>a+e.target,0);
  const tP=tT>0?Math.round(tS/tT*100):0;
  items.push({cls:'milestone',icon:'📊',text:`Team hit <b>${tS}</b> sales · <b>${tP}%</b> of target`});
  // Exceeded target count
  const exceeded=valid.filter(e=>e.pct>=100).length;
  if(exceeded>0){
    items.push({cls:'fire',icon:'🏆',text:`<b>${exceeded}</b> agent${exceeded>1?'s':''} exceeded target!`});
  }
  // FTTH highlight
  const ftthTotal=FTTH_DATA.reduce((a,e)=>a+e.total,0);
  if(ftthTotal>0){
    items.push({cls:'',icon:'📡',text:`FTTH & 5G total: <b>${ftthTotal}</b> services`});
  }
  // Daily target insight
  const daysLeft=workdaysLeft(DATA_DATE);
  const dailyNeeded=daysLeft>0?Math.ceil((tT-tS)/daysLeft):0;
  items.push({cls:'',icon:'🎯',text:`Need <b>${dailyNeeded}</b> sales/day to hit team target`});
  // Top branch
  const branches={};
  valid.forEach(e=>{if(!branches[e.branch])branches[e.branch]={s:0,t:0};branches[e.branch].s+=e.sales;branches[e.branch].t+=e.target;});
  const branchArr=Object.entries(branches).map(([b,d])=>({b,pct:d.t>0?Math.round(d.s/d.t*100):0,s:d.s}));
  const topBr=branchArr.sort((a,b)=>b.pct-a.pct)[0];
  if(topBr){
    items.push({cls:'fire',icon:'🏪',text:`Top branch: <b>${topBr.b.replace(' FBO','')}</b> at ${topBr.pct}%`});
  }
  // Build ticker (duplicate for seamless scroll)
  const html=items.map(i=>`<span class="ticker-item ${i.cls}"><span class="ticker-dot"></span>${i.icon} ${i.text}</span>`).join('');
  document.getElementById('ticker-inner').innerHTML=html+html;// duplicate for loop
  document.getElementById('ticker-wrap').style.display='block';
}

// ── Achievement Badges ──
function computeBadges(){
  const badges=[
    {
      key:'champion',icon:'👑',title:'Champion',
      desc:'Exceeded 200% of target',
      check:e=>e.target>0&&e.pct>=200
    },
    {
      key:'century',icon:'💯',title:'Century Club',
      desc:'Hit 100+ total sales',
      check:e=>e.sales>=100
    },
    {
      key:'overachiever',icon:'🚀',title:'Overachiever',
      desc:'Exceeded 100% of target',
      check:e=>e.target>0&&e.pct>=100&&e.pct<200
    },
    {
      key:'onfire',icon:'🔥',title:'On Fire',
      desc:'75-99% achievement',
      check:e=>e.target>0&&e.pct>=75&&e.pct<100
    },
    {
      key:'consistent',icon:'🎯',title:'Consistent',
      desc:'50-75% with 20+ sales',
      check:e=>e.target>0&&e.pct>=50&&e.pct<75&&e.sales>=20
    },
    {
      key:'postpaid-king',icon:'📱',title:'Postpaid King',
      desc:'Top 3 in postpaid sales',
      check:(e,ctx)=>{
        const top3=[...DATA].filter(d=>d.name!=='User_Mapping_Master').sort((a,b)=>(b.post||0)-(a.post||0)).slice(0,3).map(d=>d.user||d.name);
        return top3.includes(e.user||e.name)&&(e.post||0)>0;
      }
    },
    {
      key:'ftth-hero',icon:'📡',title:'FTTH Hero',
      desc:'Top FTTH performer',
      check:(e)=>{
        const ftth=FTTH_DATA.find(f=>f.user===e.user||f.name===e.name);
        if(!ftth)return false;
        const top3=[...FTTH_DATA].sort((a,b)=>b.total-a.total).slice(0,3).map(d=>d.user||d.name);
        return top3.includes(e.user||e.name)&&ftth.total>=5;
      }
    },
    {
      key:'rising',icon:'⭐',title:'Rising Star',
      desc:'High % on smaller target',
      check:e=>e.target>0&&e.target<=50&&e.pct>=80
    }
  ];
  return badges;
}

  // Top earners
  html+=`<div style="font-size:10px;color:#5AB87A;text-transform:uppercase;font-weight:700;letter-spacing:.1em;margin:18px 0 8px">Recently Earned</div>`;
  // Collect all (employee, badge) pairs
  const pairs=[];
  badgeStats.forEach(b=>{
    b.earners.forEach(e=>{
      pairs.push({emp:e,badge:b});
    });
  });
  // Sort by achievement %
  pairs.sort((a,b)=>b.emp.pct-a.emp.pct||b.emp.sales-a.emp.sales);
  const recent=pairs.slice(0,8);
  if(recent.length===0){
    html+=`<div class="panel-empty" style="padding:20px">No badges earned yet</div>`;
  }else{
    html+=recent.map(p=>{
      const gIdx=DATA.findIndex(d=>d.user===p.emp.user&&d.name===p.emp.name);
      return`<div onclick="closePanel();setTimeout(()=>openModal(${gIdx}),300)" style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(246,201,78,0.04);border:1px solid rgba(246,201,78,0.15);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:background .15s" onmouseover="this.style.background='rgba(246,201,78,0.08)'" onmouseout="this.style.background='rgba(246,201,78,0.04)'">
        <div style="font-size:22px">${p.badge.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:#F0FFF8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.emp.name}</div>
          <div style="font-size:10px;color:#F6C94E;margin-top:2px">Earned: ${p.badge.title}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:800;color:${pc(p.emp.pct)}">${p.emp.pct}%</div>
          <div style="font-size:9px;color:#9A7820">${p.emp.sales} sales</div>
        </div>
      </div>`;
    }).join('');
  }
  body.innerHTML=html;
}

function toggleMobileSidebar(){
  const sb=document.getElementById('mobile-sidebar');
  const bd=document.getElementById('mobile-sidebar-backdrop');
  const btn=document.getElementById('mobile-menu-btn');
  if(sb.classList.contains('open')){
    closeMobileSidebar();
  }else{
    renderMobileSidebar();
    sb.classList.add('open');
    bd.classList.add('open');
    btn.classList.add('active');
  }
}

function closeMobileSidebar(){
  document.getElementById('mobile-sidebar')?.classList.remove('open');
  document.getElementById('mobile-sidebar-backdrop')?.classList.remove('open');
  document.getElementById('mobile-menu-btn')?.classList.remove('active');
}

function renderMobileSidebar(){
  const content=document.getElementById('mobile-sidebar-content');

  const k={aw:0,am:0,ms:0,na:0};

  content.innerHTML=`

      </button>
      <button class="sb-item ${CUR==='Ahmed'?'active':''}" onclick="setView('Ahmed',this);closeMobileSidebar()">
        <span class="sb-d" style="background:#85B7EB"></span>Ahmed AlMutairi<span class="sb-cnt">${k.am}</span>
      </button>
      <button class="sb-item ${CUR==='Mohammed'?'active':''}" onclick="setView('Mohammed',this);closeMobileSidebar()">
        <span class="sb-d" style="background:#5DCAA5"></span>Mohammed AlShehri<span class="sb-cnt">${k.ms}</span>
      </button>
      <button class="sb-item ${CUR==='Najwah'?'active':''}" onclick="setView('Najwah',this);closeMobileSidebar()">
